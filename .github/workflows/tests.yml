      - name: Run tests
name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show files
        run: ls -R

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile app/database.py app/models.py app/queue_worker.py app/main.py tests/test_app.py

        run: python -m pytest -q
