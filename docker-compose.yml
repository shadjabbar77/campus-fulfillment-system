services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: campus_fulfillment
      POSTGRES_USER: campus_user
      POSTGRES_PASSWORD: campus_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_user -d campus_fulfillment"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://campus_user:campus_pass@db:5432/campus_fulfillment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://campus_user:campus_pass@db:5432/campus_fulfillment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: rq worker fulfillment --url redis://redis:6379/0

volumes:
  postgres_data: